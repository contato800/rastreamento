<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rastreamento de Pedidos</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a;min-height:100vh}
.hero{background:#fff;border-bottom:1px solid #e8e8e8;padding:2.5rem 1rem 2rem;text-align:center}
.hero h1{font-size:1.75rem;font-weight:600;margin-bottom:0.4rem}
.hero p{font-size:0.95rem;color:#666}
.search-wrap{max-width:600px;margin:2rem auto;padding:0 1rem}
.search-box{display:flex;gap:8px}
.search-box input{flex:1;height:50px;padding:0 16px;border-radius:10px;border:2px solid #d0d0d0;font-size:16px;outline:none;background:#fff;color:#1a1a1a;-webkit-appearance:none;appearance:none}
.search-box input:focus{border-color:#4a6cf7}
.search-box button{height:50px;padding:0 22px;border-radius:10px;border:none;background:#4a6cf7;color:#fff;font-size:15px;font-weight:500;cursor:pointer;white-space:nowrap}
.search-box button:active{opacity:0.85}
.results{max-width:600px;margin:0 auto;padding:0 1rem 3rem}
.count{font-size:13px;color:#888;margin-bottom:1rem}
.card{background:#fff;border-radius:12px;border:1px solid #e8e8e8;padding:1.25rem;margin-bottom:10px}
.card-name{font-size:15px;font-weight:600;margin-bottom:2px}
.card-email{font-size:13px;color:#888;margin-bottom:14px}
.fields{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.fl{font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.fv{font-size:13px;font-weight:500;color:#1a1a1a;word-break:break-all}
.intl-badge{display:inline-block;background:#eef2ff;color:#4a6cf7;font-size:12px;padding:3px 10px;border-radius:20px;font-weight:500}
.track-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:#f5f5f5;border:1px solid #e0e0e0;border-radius:8px;font-size:13px;font-weight:500;color:#1a1a1a;text-decoration:none}
.track-btn:hover{background:#ebebeb}
.msg{text-align:center;padding:3rem 1rem;color:#999;font-size:14px;line-height:1.6}
.loading{text-align:center;padding:3rem 1rem;color:#4a6cf7;font-size:14px}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid #e0e0e0;border-top-color:#4a6cf7;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:4rem 1rem}
.empty-state .icon{font-size:2.5rem;margin-bottom:1rem}
.empty-state p{color:#999;font-size:14px}
@media(max-width:480px){.fields{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="hero">
  <h1>📦 Rastreamento de Pedidos</h1>
  <p>Digite seu e-mail para localizar seu pedido</p>
</div>

<div class="search-wrap">
  <div class="search-box">
    <input type="email" id="q" placeholder="Seu e-mail..." autocomplete="email" autocorrect="off" autocapitalize="none" spellcheck="false" />
    <button type="button" onclick="buscar()">Buscar</button>
  </div>
</div>

<div class="results" id="results">
  <div id="status" class="loading"><span class="spinner"></span>Carregando dados...</div>
</div>

<script>
var SHEET_ID = "1d1A8XVHijDNbQdL0N772KYk36EgdsXpsYbvVGLOl9Hw";

var ABAS = [
  { nome: "PL3.0",  gid: "452108846"  },
  { nome: "LT2.0",  gid: "2116134679" },
  { nome: "LF",     gid: "742301019"  },
  { nome: "LF2A",   gid: "483340354"  },
  { nome: "COMBOS", gid: "889315982"  }
];

// B=1, C=2, D=3
var COL_EMAIL = 1;
var COL_NOME  = 2;
var COL_RASTR = 3;

var todosClientes = [];
var carregado = false;

function csvUrl(gid) {
  return "https://docs.google.com/spreadsheets/d/" + SHEET_ID + "/export?format=csv&gid=" + gid;
}

function splitCSVLine(line) {
  var result = [], cur = "", inQ = false;
  for (var i = 0; i < line.length; i++) {
    var c = line[i];
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { result.push(cur.trim()); cur = ""; }
    else { cur += c; }
  }
  result.push(cur.trim());
  return result;
}

function parseCSV(text, nomeAba) {
  var lines = text.split(/\r?\n/);
  var result = [];
  for (var i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    var cols = splitCSVLine(lines[i]);
    var email = cols.length > COL_EMAIL ? cols[COL_EMAIL].toLowerCase().trim() : "";
    if (!email || email.indexOf("@") === -1) continue;
    result.push({
      email: email,
      nome:  cols.length > COL_NOME  ? cols[COL_NOME].trim()  : "",
      rastr: cols.length > COL_RASTR ? cols[COL_RASTR].trim() : "",
      aba:   nomeAba
    });
  }
  return result;
}

function fetchAba(aba) {
  return fetch(csvUrl(aba.gid))
    .then(function(r) {
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.text();
    })
    .then(function(text) { return parseCSV(text, aba.nome); })
    .catch(function() { return []; });
}

function carregarTudo() {
  Promise.all(ABAS.map(fetchAba)).then(function(resultados) {
    todosClientes = [];
    resultados.forEach(function(lista) {
      lista.forEach(function(c) { todosClientes.push(c); });
    });
    carregado = true;
    document.getElementById("status").style.display = "none";
    document.getElementById("results").innerHTML =
      '<div class="empty-state"><div class="icon">🔍</div><p>Digite seu e-mail acima para ver o rastreamento do seu pedido</p></div>';
  }).catch(function() {
    document.getElementById("status").innerHTML = '<span style="color:#e55">⚠️ Erro ao carregar. Recarregue a página.</span>';
  });
}

function norm(s) {
  return (s || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
}

function isIntl(cod) {
  return !cod || norm(cod).includes("intern") || cod === "#n/a";
}

function getLinkRastr(cod) {
  if (!cod || isIntl(cod)) return "https://rastreamento.correios.com.br/app/index.php";
  if (/^[A-Z]{2}\d+BR$/i.test(cod)) return "https://rastreamento.correios.com.br/app/index.php";
  if (/^\d{15,}$/.test(cod) || /^LGI-/i.test(cod) || /^\d{9}$/.test(cod)) return "https://melhorrastreio.com.br/";
  return "https://rastreamento.correios.com.br/app/index.php";
}

function getTransp(cod) {
  return getLinkRastr(cod).includes("melhorrastreio") ? "Melhor Rastreio" : "Correios";
}

function renderCard(c) {
  var intl = isIntl(c.rastr);
  var codHtml = intl
    ? '<span class="intl-badge">Envio Internacional</span>'
    : '<span class="fv">' + c.rastr + '</span>';
  var link = getLinkRastr(c.rastr);
  return '<div class="card">'
    + '<div class="card-name">' + (c.nome || "—") + '</div>'
    + '<div class="card-email">' + c.email + '</div>'
    + '<div class="fields">'
    + '<div><div class="fl">Código de rastreio</div>' + codHtml + '</div>'
    + '<div><div class="fl">Transportadora</div><div class="fv">' + getTransp(c.rastr) + '</div></div>'
    + '</div>'
    + '<a class="track-btn" href="' + link + '" target="_blank" rel="noopener">'
    + (intl ? "Rastrear nos Correios →" : "Ver rastreamento →")
    + '</a></div>';
}

function buscar() {
  if (!carregado) { alert("Aguarde, os dados ainda estão carregando..."); return; }
  var q = norm(document.getElementById("q").value);
  var out = document.getElementById("results");
  if (!q) {
    out.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>Digite seu e-mail acima para ver o rastreamento do seu pedido</p></div>';
    return;
  }
  var res = todosClientes.filter(function(c) { return norm(c.email) === q; });
  if (res.length === 0) {
    out.innerHTML = '<div class="msg">Nenhum pedido encontrado para esse e-mail.<br>Verifique se digitou corretamente.</div>';
    return;
  }
  out.innerHTML = '<p class="count">' + res.length + ' pedido' + (res.length > 1 ? 's' : '') + ' encontrado' + (res.length > 1 ? 's' : '') + '</p>'
    + res.map(renderCard).join('');
}

document.getElementById("q").addEventListener("keydown", function(e) { if (e.key === "Enter") buscar(); });
carregarTudo();
</script>
</body>
</html>
