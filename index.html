<html lang="pt-BR">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rastreamento de Pedidos</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a;min-height:100vh}
.hero{background:#fff;border-bottom:1px solid #e8e8e8;padding:2.5rem 1rem 2rem;text-align:center}
.hero h1{font-size:1.75rem;font-weight:600;margin-bottom:0.4rem}
.hero p{font-size:0.95rem;color:#666}
.search-wrap{max-width:600px;margin:2rem auto;padding:0 1rem}
.search-box{display:flex;gap:8px}
.search-box input[type=text]{
  -webkit-appearance:none;
  appearance:none;
  flex:1;
  height:50px;
  padding:0 16px;
  border-radius:10px;
  border:2px solid #d0d0d0;
  font-size:16px;
  outline:none;
  background:#fff;
  color:#1a1a1a;
  -webkit-user-select:text;
  user-select:text;
  pointer-events:auto;
}
.search-box input[type=text]:focus{border-color:#4a6cf7}
.search-box button{
  height:50px;
  padding:0 22px;
  border-radius:10px;
  border:none;
  background:#4a6cf7;
  color:#fff;
  font-size:15px;
  font-weight:500;
  cursor:pointer;
  white-space:nowrap;
  -webkit-appearance:none;
}
.search-box button:hover{background:#3a5ce6}
.results{max-width:600px;margin:0 auto;padding:0 1rem 3rem}
.count{font-size:13px;color:#888;margin-bottom:1rem}
.card{background:#fff;border-radius:12px;border:1px solid #e8e8e8;padding:1.25rem;margin-bottom:10px}
.card-name{font-size:15px;font-weight:600;margin-bottom:2px}
.card-email{font-size:13px;color:#888;margin-bottom:14px}
.fields{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.fl{font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.fv{font-size:13px;font-weight:500;color:#1a1a1a;word-break:break-all}
.intl-badge{display:inline-block;background:#eef2ff;color:#4a6cf7;font-size:12px;padding:3px 10px;border-radius:20px;font-weight:500}
.track-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:#f5f5f5;border:1px solid #e0e0e0;border-radius:8px;font-size:13px;font-weight:500;color:#1a1a1a;text-decoration:none}
.track-btn:hover{background:#ebebeb}
.msg{text-align:center;padding:3rem 1rem;color:#999;font-size:14px}
.empty-state{text-align:center;padding:4rem 1rem}
.empty-state .icon{font-size:2.5rem;margin-bottom:1rem}
.empty-state p{color:#999;font-size:14px}
@media(max-width:480px){.fields{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="hero">
  <h1>📦 Rastreamento de Pedidos</h1>
  <p>Digite seu nome ou e-mail para localizar seu pedido</p>
</div>

<div class="search-wrap">
  <div class="search-box">
    <input type="text" id="q" placeholder="Seu nome ou e-mail..." autocomplete="off" spellcheck="false" />
    <button type="button" onclick="buscar()">Buscar</button>
  </div>
</div>

<div class="results" id="results">
  <div class="empty-state">
    <div class="icon">🔍</div>
    <p>Digite seu nome ou e-mail acima para ver o rastreamento do seu pedido</p>
  </div>
</div>

function norm(s){
  return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
}

function isIntl(cod){
  return norm(cod).includes('intern') || cod==='' || cod==='#N/A';
}

function getTransp(link){
  if(!link) return '—';
  if(link.includes('melhorrastreio')) return 'Melhor Rastreio';
  if(link.includes('correios')) return 'Correios';
  return 'Transportadora';
}

function renderCard(d){
  var email=d[0], nome=d[1], cod=d[2], link=d[3];
  var intl=isIntl(cod);
  var transp=getTransp(link);
  var codHtml = (intl||!cod||cod==='#N/A')
    ? '<span class="intl-badge">Envio Internacional</span>'
    : '<span class="fv">'+cod+'</span>';
  var btnHtml = (link && !intl)
    ? '<a class="track-btn" href="'+link+'" target="_blank" rel="noopener">Ver rastreamento →</a>'
    : (link && intl)
      ? '<a class="track-btn" href="'+link+'" target="_blank" rel="noopener">Rastrear nos Correios →</a>'
      : '';
  return '<div class="card">'
    +'<div class="card-name">'+nome+'</div>'
    +'<div class="card-email">'+(email||'—')+'</div>'
    +'<div class="fields">'
    +'<div><div class="fl">Código de rastreio</div>'+codHtml+'</div>'
    +'<div><div class="fl">Transportadora</div><div class="fv">'+transp+'</div></div>'
    +'</div>'+btnHtml+'</div>';
}

function buscar(){
  var q=norm(document.getElementById('q').value);
  var out=document.getElementById('results');
  if(!q){
    out.innerHTML='<div class="empty-state"><div class="icon">🔍</div><p>Digite seu nome ou e-mail acima para ver o rastreamento do seu pedido</p></div>';
    return;
  }
  var res=dados.filter(function(d){return norm(d[0]).includes(q)||norm(d[1]).includes(q);});
  if(res.length===0){
    out.innerHTML='<div class="msg">Nenhum pedido encontrado.<br>Verifique o nome ou e-mail digitado.</div>';
    return;
  }
  out.innerHTML='<p class="count">'+res.length+' resultado'+(res.length>1?'s':'')+'</p>'+res.map(renderCard).join('');
}

document.getElementById('q').addEventListener('keydown',function(e){if(e.key==='Enter')buscar();});
document.getElementById('q').addEventListener('input',function(){if(!this.value)document.getElementById('results').innerHTML='<div class="empty-state"><div class="icon">🔍</div><p>Digite seu nome ou e-mail acima para ver o rastreamento do seu pedido</p></div>';});
</script>
